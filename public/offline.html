<!DOCTYPE html>
<html lang="ro">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline – Academia Politica AUR</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f8fafc;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
      text-align: center;
      color: #374151;
    }
    .card {
      background: white;
      border-radius: 1.5rem;
      padding: 2.5rem 2rem;
      max-width: 380px;
      width: 100%;
      box-shadow: 0 4px 24px rgba(0,0,0,0.08);
    }
    .emoji { font-size: 4rem; margin-bottom: 1rem; display: block; }
    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; color: #111827; }
    p { font-size: 0.95rem; color: #6b7280; line-height: 1.6; margin-bottom: 1.5rem; }
    .moti-box {
      background: #f0fdfa;
      border: 1.5px solid #99f6e4;
      border-radius: 1rem;
      padding: 1rem 1.2rem;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      text-align: left;
    }
    .moti-avatar {
      font-size: 2rem;
      flex-shrink: 0;
      line-height: 1;
      margin-top: 0.1rem;
    }
    .moti-text { font-size: 0.85rem; color: #0f766e; font-style: italic; }
    button {
      background: #0d9488;
      color: white;
      border: none;
      padding: 0.75rem 2rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover { background: #0f766e; }
    .logo {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 1.5rem;
    }
    .logo .ami { color: #3b82f6; }
    .logo .si { color: #9ca3af; margin: 0 0.25rem; }
    .logo .moti { color: #0d9488; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="ami">Ami</span><span class="si">&</span><span class="moti">Moti</span>
    </div>
    <span class="emoji">📡</span>
    <h1>Nu există conexiune</h1>
    <p>Verifică conexiunea la internet și încearcă din nou.</p>
    <div class="moti-box">
      <span class="moti-avatar">🦉</span>
      <span class="moti-text">Eu, Moti, te îndrumez! Încearcă să te conectezi la Wi-Fi sau activează datele mobile, apoi apasă butonul de mai jos.</span>
    </div>
    <button onclick="window.location.reload()">Încearcă din nou</button>
  </div>
</body>
</html>
